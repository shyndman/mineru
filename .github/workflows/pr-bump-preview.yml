name: PR bump preview

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  bump-preview:
    if: >
      ${{
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name ==
          github.event.pull_request.base.repo.full_name
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up Commitizen
        uses: commitizen-tools/setup-cz@main
        with:
          set-git-config: false

      - name: Detect bootstrap release
        id: bootstrap
        run: |
          if [ -n "$(git tag --list 'v0.0.0')" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Preview v0.0.0 bootstrap release
        if: steps.bootstrap.outputs.value == 'true'
        id: bootstrap-preview
        run: |
          cat > .cz-bootstrap.toml <<'EOF'
          [tool.commitizen]
          name = "cz_conventional_commits"
          version_provider = "pep621"
          version_scheme = "pep440"
          tag_format = "v$version"
          update_changelog_on_bump = true
          changelog_incremental = false
          major_version_zero = true
          EOF
          {
            echo "status=0"
            echo "output<<__CZ_BUMP_PREVIEW__"
            echo "Bootstrap release: v0.0.0"
            echo
            cz --config .cz-bootstrap.toml changelog --unreleased-version v0.0.0 --dry-run
            echo "__CZ_BUMP_PREVIEW__"
          } >> "$GITHUB_OUTPUT"
          rm .cz-bootstrap.toml

      - name: Run cz bump --dry-run
        if: steps.bootstrap.outputs.value != 'true'
        id: dry-run
        run: |
          set +e
          output="$(cz bump --dry-run --yes 2>&1)"
          status=$?
          set -e
          {
            echo "status=${status}"
            echo "output<<__CZ_BUMP_PREVIEW__"
            printf '%s\n' "${output}"
            echo "__CZ_BUMP_PREVIEW__"
          } >> "$GITHUB_OUTPUT"

      - name: Build comment body
        env:
          STATUS: ${{ steps.bootstrap.outputs.value == 'true' && steps.bootstrap-preview.outputs.status || steps.dry-run.outputs.status }}
          OUTPUT: ${{ steps.bootstrap.outputs.value == 'true' && steps.bootstrap-preview.outputs.output || steps.dry-run.outputs.output }}
        run: |
          {
            echo "<!-- commitizen-bump-preview -->"
            echo "## Commitizen bump preview"
            echo
            case "${STATUS}" in
              0)
                if [ "${{ steps.bootstrap.outputs.value }}" = "true" ]; then
                  echo "Merging this PR will create the bootstrap release:"
                else
                  echo "Merging this PR will produce the following bump:"
                fi
                echo
                echo '```'
                printf '%s\n' "${OUTPUT}"
                echo '```'
                ;;
              21)
                echo "No commits in this PR are eligible for a version bump."
                ;;
              *)
                echo "cz bump --dry-run exited with status ${STATUS}:"
                echo
                echo '```'
                printf '%s\n' "${OUTPUT}"
                echo '```'
                ;;
            esac
          } > comment.md

      - name: Update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          body-includes: "<!-- commitizen-bump-preview -->"
          edit-mode: replace
