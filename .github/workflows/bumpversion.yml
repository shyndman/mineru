name: Bump version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  bump-version:
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Detect bootstrap release
        id: bootstrap
        run: |
          if [ -n "$(git tag --list 'v0.0.0')" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create v0.0.0 bootstrap release
        if: steps.bootstrap.outputs.value == 'true'
        run: |
          cat > .cz-bootstrap.toml <<'EOF'
          [tool.commitizen]
          name = "cz_conventional_commits"
          version_provider = "pep621"
          version_scheme = "pep440"
          tag_format = "v$version"
          update_changelog_on_bump = true
          changelog_incremental = false
          major_version_zero = true
          EOF
          uv run cz --config .cz-bootstrap.toml changelog --unreleased-version v0.0.0
          uv run cz --config .cz-bootstrap.toml changelog --unreleased-version v0.0.0 --dry-run > body.md
          rm .cz-bootstrap.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "bump: release 0.0.0"
          git tag -a v0.0.0 -m "v0.0.0"
          git push origin HEAD:${GITHUB_REF_NAME} refs/tags/v0.0.0

      - name: Release v0.0.0
        if: steps.bootstrap.outputs.value == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.0
          body_path: body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create bump and changelog
        if: steps.bootstrap.outputs.value != 'true'
        id: cz
        uses: commitizen-tools/commitizen-action@0.27.1
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          changelog_increment_filename: body.md
          no_raise: "21"
          push: false

      - name: Update lockfile and push release commit
        if: steps.bootstrap.outputs.value != 'true' && steps.cz.outputs.version != '' && steps.cz.outputs.version != steps.cz.outputs.previous_version
        run: |
          uv lock
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "bump: lock uv for v${{ steps.cz.outputs.version }}"
          git tag -f v${{ steps.cz.outputs.version }}
          git push origin HEAD:${GITHUB_REF_NAME} refs/tags/v${{ steps.cz.outputs.version }} --force

      - name: Create GitHub release
        if: steps.bootstrap.outputs.value != 'true' && steps.cz.outputs.version != '' && steps.cz.outputs.version != steps.cz.outputs.previous_version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.cz.outputs.version }}
          body_path: body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci
